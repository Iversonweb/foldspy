name: PHPUnit Tests

on:
  push:
    branches: [ trunk, develop, branch-*, feat/* ]
  pull_request:
    branches: [ trunk, develop, branch-*, feat/* ]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --optimize-autoloader

      - name: Debug Logger class
        run: |
          find src/Support -name Logger.php
          grep -q 'function log' src/Support/Logger.php && echo "log() found" || echo "log() NOT found"

      - name: Run PHPUnit tests
        run: composer test-unit